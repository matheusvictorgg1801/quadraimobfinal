<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quadraimob · Central de Processos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand:        #66cff5;
      --brand-deep:   #1fa8d8;
      --brand-dim:    rgba(102,207,245,0.13);
      --brand-border: rgba(102,207,245,0.38);
      --bg:        #eef3f9;
      --surface:   #ffffff;
      --surface-2: #e6edf6;
      --surface-3: #d8e4ef;
      --text-1: #0d1c2e;
      --text-2: #3a5870;
      --text-3: #7a9ab5;
      --border:   rgba(0,0,0,0.08);
      --border-2: rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-sm: 9px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      width: 800px; height: 800px;
      right: -200px; top: -200px;
      background: radial-gradient(circle, rgba(102,207,245,0.12) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none; z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 200;
      background: #0d1520;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .hdr {
      max-width: 1440px; margin: 0 auto;
      padding: 0 28px; height: 74px;
      display: flex; align-items: center; gap: 18px;
    }
    .logo {
      text-decoration: none; flex-shrink: 0;
      display: flex; align-items: center;
    }
    .logo img {
      height: 42px;
      width: auto;
      display: block;
    }
    .hdr-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
    .hdr-lbl {
      font-size: 11px; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 500; flex-shrink: 0;
    }
    .search-wrap {
      position: relative; flex: 1;
      max-width: 440px; margin-left: auto;
    }
    .search-ico {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35); pointer-events: none; display: flex;
    }
    #searchInput {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      padding: 9px 38px 9px 37px;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    #searchInput::placeholder { color: rgba(255,255,255,0.35); }
    #searchInput:focus {
      border-color: rgba(102,207,245,0.5);
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 0 3px rgba(102,207,245,0.15);
    }
    #searchClear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer;
      width: 24px; height: 24px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    #searchClear:hover { color: #fff; background: rgba(255,255,255,0.1); }
    #searchClear.show { display: flex; }

    /* STATS */
    .stats-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .stats-inner {
      max-width: 1440px; margin: 0 auto;
      padding: 10px 28px;
      display: flex; align-items: center;
      overflow-x: auto; scrollbar-width: none;
    }
    .stats-inner::-webkit-scrollbar { display: none; }
    .stat {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 18px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat:first-child { padding-left: 0; }
    .stat:last-child  { border-right: none; }
    .stat-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .stat-lbl { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
    .stat-val { font-size: 13px; font-weight: 600; color: var(--text-1); }

    /* MAIN */
    .main { padding: 34px 0 100px; }

    /* TRAINING BANNER */
    .training-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: var(--radius);
      background: linear-gradient(120deg, #0d1520 0%, #16324a 100%);
      border: 1px solid rgba(102,207,245,0.35);
      text-decoration: none;
      margin-bottom: 24px;
      transition: transform 0.18s cubic-bezier(.34,1.4,.64,1), box-shadow 0.18s, border-color 0.18s;
    }
    .training-banner:hover {
      transform: translateY(-2px);
      border-color: rgba(102,207,245,0.6);
      box-shadow: 0 8px 24px rgba(102,207,245,0.22), 0 2px 8px rgba(0,0,0,0.12);
    }
    .training-ico {
      width: 42px; height: 42px; border-radius: 10px;
      background: rgba(102,207,245,0.16);
      color: var(--brand);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .training-text { flex: 1; min-width: 0; }
    .training-title {
      font-family: 'Syne', sans-serif;
      font-size: 15.5px; font-weight: 700;
      color: #ffffff; letter-spacing: -0.2px;
    }
    .training-sub { font-size: 12.5px; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .training-arrow {
      color: var(--brand); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.18s;
    }
    .training-banner:hover .training-arrow { transform: translateX(3px); }

    /* AREA CHIPS */
    #areaFilters {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-bottom: 30px;
    }
    .achip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 50px;
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--text-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .achip:hover:not(.active) { color: var(--text-1); border-color: rgba(0,0,0,0.25); background: var(--surface-2); }
    .cpip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* SEARCH BANNER */
    #searchBanner {
      display: none; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: var(--radius-sm);
      background: var(--brand-dim);
      border: 1px solid var(--brand-border);
      margin-bottom: 26px;
      font-size: 13.5px; color: var(--text-2);
    }
    #searchBanner.show { display: flex; }
    #searchBanner strong { color: var(--brand-deep); }

    /* AREA SECTION */
    .area-sec { margin-bottom: 42px; }
    .area-head {
      display: flex; align-items: center; gap: 11px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 15px;
    }
    .area-ico {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .area-title {
      font-family: 'Syne', sans-serif;
      font-size: 15.5px; font-weight: 700;
      color: var(--text-1); letter-spacing: -0.2px;
    }
    .area-cat {
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      border: 1px solid; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .area-cnt {
      margin-left: auto;
      font-size: 11.5px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }

    /* PROCESS GRID */
    .pgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
      gap: 10px;
    }

    /* PROCESS CARD */
    .pcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 15px 16px;
      display: flex; flex-direction: column; gap: 13px;
      transition: transform 0.18s cubic-bezier(.34,1.4,.64,1),
                  border-color 0.18s, box-shadow 0.18s, background 0.18s;
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(9px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pcard:hover {
      transform: translateY(-3px);
      background: var(--surface);
      border-color: var(--brand-border);
      box-shadow: 0 8px 24px rgba(102,207,245,0.18), 0 2px 8px rgba(0,0,0,0.07);
    }
    .card-tag {
      font-size: 10.5px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      width: fit-content; display: none;
    }
    .pname {
      font-size: 13.5px; font-weight: 500;
      color: var(--text-1); line-height: 1.42;
    }
    .pname mark {
      background: rgba(102,207,245,0.2);
      color: var(--brand); border-radius: 3px;
      padding: 0 2px; font-style: normal;
    }
    .cbtns { display: flex; gap: 7px; }
    .dbtn {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 5px;
      padding: 7px 10px; border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 11.5px; font-weight: 600;
      letter-spacing: 0.03em; cursor: pointer;
      transition: all 0.15s; position: relative;
    }
    .dbtn:hover { color: var(--text-1); background: var(--surface-3); border-color: var(--border-2); }
    .dbtn.pop:hover  { color: var(--brand-deep); border-color: rgba(102,207,245,0.5); background: rgba(102,207,245,0.12); }
    .dbtn.flux:hover { color: #0d9e7e; border-color: rgba(13,158,126,0.35);  background: rgba(13,158,126,0.08);  }

    /* Indicador de documento não elaborado */
    .dbtn-na {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 5px;
      padding: 7px 10px; border-radius: 7px;
      border: 1px dashed var(--border-2);
      background: transparent;
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 500;
      font-style: italic; letter-spacing: 0.01em;
      user-select: none;
    }

    .dbtn::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 7px); left: 50%;
      transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border-2);
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      color: var(--text-2); font-size: 11px; padding: 5px 10px;
      border-radius: 6px; white-space: nowrap;
      pointer-events: none; opacity: 0;
      transition: opacity 0.12s; z-index: 50; font-weight: 400;
    }
    .dbtn:hover::after { opacity: 1; }

    /* EMPTY */
    #emptyState {
      display: none; flex-direction: column;
      align-items: center; gap: 13px;
      padding: 80px 24px; text-align: center;
    }
    #emptyState.show { display: flex; }
    .empty-ico {
      width: 50px; height: 50px; border-radius: 14px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
    }
    .empty-t { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--text-2); }
    .empty-s { font-size: 13px; color: var(--text-3); }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 18px 28px; text-align: center;
      font-size: 12px; color: var(--text-3); letter-spacing: 0.03em;
    }
    footer strong { color: var(--brand-deep); font-weight: 600; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hdr-sep, .hdr-lbl { display: none; }
      .search-wrap { max-width: none; }
      .pgrid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      .wrap, .hdr, .stats-inner { padding-left: 16px; padding-right: 16px; }
      .pgrid { grid-template-columns: 1fr; }
      .training-sub { display: none; }
    }
  </style>
</head>

const ICO = {
  briefcase: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>`,
  users:     `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  chart:     `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>`,
  megaphone: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>`,
  doc:       `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
  flow:      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="15" width="6" height="6" rx="1"/><path d="M9 6h6.5a3.5 3.5 0 0 1 0 7H9"/><path d="m15 18-3 3 3 3"/></svg>`,
  search:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1fa8d8" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  minus:     `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
};

const st = { area: 'all', q: '' };

const allAreas = () => DATA.areas;
const total    = () => DATA.areas.reduce((s,a) => s + a.processes.length, 0);

function hl(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

function openLink(url, type) {
  if (!url || url === '#') {
    alert(`O link do ${type} ainda não foi configurado.\n\nEdite o index.html e substitua "#" pelo link real do Google Drive.`);
    return;
  }
  window.open(url, '_blank', 'noopener,noreferrer');
}

function renderStats() {
  const t = total();
  let html = `<div class="stat"><span class="stat-pip" style="background:#66cff5"></span><span class="stat-lbl">Total</span><span class="stat-val">${t} processos</span></div>`;
  allAreas().forEach(a => {
    html += `<div class="stat"><span class="stat-pip" style="background:${a.color}"></span><span class="stat-lbl">${a.name}</span><span class="stat-val">${a.processes.length}</span></div>`;
  });
  document.getElementById('statsInner').innerHTML = html;
}

function renderFilters() {
  const areas = allAreas();
  const allActive = st.area === 'all';
  let html = `<button class="achip ${allActive ? 'active' : ''}"
    style="${allActive ? 'background:#2d4258;border-color:#2d4258;color:#ffffff;font-weight:700;' : ''}"
    onclick="setArea('all')"><span class="cpip" style="background:${allActive ? 'rgba(255,255,255,0.7)' : 'var(--text-2)'}"></span>Todas</button>`;
  html += areas.map(a => {
    const active = st.area === a.id;
    return `<button class="achip ${active ? 'active' : ''}"
      style="${active ? `background:${a.color};border-color:${a.color};color:#07090e;font-weight:700;` : ''}"
      onclick="setArea('${a.id}')"><span class="cpip" style="background:${active ? '#07090e' : a.color}"></span>${a.name}</button>`;
  }).join('');
  document.getElementById('areaFilters').innerHTML = html;
}

function renderArea(area, procs) {
  const cards = procs.map((p, i) => `
    <div class="pcard" style="animation-delay:${Math.min(i * 25, 270)}ms">
      <div class="pname">${hl(p.name, st.q)}</div>
      <div class="cbtns">
        ${p.popUrl === '#'
          ? `<span class="dbtn-na">${ICO.minus} POP não elaborado</span>`
          : `<button class="dbtn pop" onclick="openLink('${p.popUrl}','POP')" data-tip="Abrir POP no Drive">${ICO.doc} POP</button>`}
        ${p.fluxUrl === '#'
          ? `<span class="dbtn-na">${ICO.minus} Fluxograma não elaborado</span>`
          : `<button class="dbtn flux" onclick="openLink('${p.fluxUrl}','Fluxograma')" data-tip="Abrir Fluxograma no Drive">${ICO.flow} Fluxograma</button>`}
      </div>
    </div>`).join('');

  return `<div class="area-sec">
    <div class="area-head">
      <div class="area-ico" style="background:${area.color}18;color:${area.color}">${ICO[area.icon] || ICO.doc}</div>
      <div class="area-title">${area.name}</div>
      <div class="area-cnt" style="background:${area.color}18;color:${area.color}">${procs.length} processo${procs.length!==1?'s':''}</div>
    </div>
    <div class="pgrid">${cards}</div>
  </div>`;
}

function render() {
  renderFilters();

  const content = document.getElementById('contentArea');
  const empty   = document.getElementById('emptyState');
  const banner  = document.getElementById('searchBanner');

  if (st.q) {
    const byArea = {};
    let found = 0;
    for (const area of DATA.areas) {
      if (st.area !== 'all' && area.id !== st.area) continue;
      const matched = area.processes.filter(p => p.name.toLowerCase().includes(st.q.toLowerCase()));
      if (matched.length) { byArea[area.id] = { area, procs: matched }; found += matched.length; }
    }
    if (!found) { content.innerHTML = ''; empty.classList.add('show'); banner.classList.remove('show'); return; }
    empty.classList.remove('show');
    banner.innerHTML = `${ICO.search} <span>Encontrado <strong>${found} processo${found!==1?'s':''}</strong> para &ldquo;<strong>${st.q}</strong>&rdquo;</span>`;
    banner.classList.add('show');
    content.innerHTML = Object.values(byArea).map(({area, procs}) => renderArea(area, procs)).join('');
  } else {
    banner.classList.remove('show');
    empty.classList.remove('show');
    const areas = st.area === 'all' ? DATA.areas : DATA.areas.filter(a => a.id === st.area);
    if (!areas.length) { content.innerHTML = ''; empty.classList.add('show'); return; }
    content.innerHTML = areas.map(a => renderArea(a, a.processes)).join('');
  }
}

function setArea(id) { st.area = id; render(); }
function clearSearch() {
  document.getElementById('searchInput').value = '';
  st.q = '';
  document.getElementById('searchClear').classList.remove('show');
  render();
}

document.getElementById('searchInput').addEventListener('input', function () {
  st.q = this.value.trim();
  document.getElementById('searchClear').classList.toggle('show', st.q.length > 0);
  render();
});

renderStats();
render();
</script>
